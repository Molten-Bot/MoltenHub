worker_processes auto;

events {
	worker_connections 1024;
}

http {
	upstream moltenhub_upstream {
		server moltenhubd:8080;
		keepalive 32;
	}

	limit_req_zone $binary_remote_addr zone=moltenhub_per_ip:10m rate=500r/m;

	map $http_upgrade $connection_upgrade {
		default upgrade;
		''      close;
	}

	server {
		listen 8081;
		server_name _;

		client_max_body_size 2m;
		proxy_connect_timeout 5s;
		proxy_send_timeout 65s;
		proxy_read_timeout 65s;

		location / {
			limit_req zone=moltenhub_per_ip burst=50 nodelay;

			proxy_pass http://moltenhub_upstream;
			proxy_http_version 1.1;
			proxy_set_header Host $host;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header Connection $connection_upgrade;
			proxy_set_header Upgrade $http_upgrade;
		}
	}
}
